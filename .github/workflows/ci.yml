name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --include=optional
      - name: Rebuild Tailwind native modules for Linux
        run: npm rebuild -w storefront
      - run: npm run check
      - run: npm run build
