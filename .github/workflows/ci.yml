name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --include=optional
      - name: Install lightningcss Linux binding for Tailwind
        run: npm install --no-save -w storefront lightningcss-linux-x64-gnu@1.32.0
      - run: npm run check
      - run: npm run build
